server.port=8080
ratelimiter.redis.enabled=true
ratelimiter.security.api-keys.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,metrics,prometheus
ratelimiter.adaptive.enabled=true
ratelimiter.adaptive.evaluation-interval-ms=5000
logging.level.dev.bnacar.distributedratelimiter.adaptive=DEBUG