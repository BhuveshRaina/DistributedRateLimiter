services:
  # The Redis "Source of Truth"
  redis:
    image: redis:7-alpine
    container_name: drl-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # High-Performance Load Balancer for Workers
  loadbalancer:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: drl-lb
    ports:
      - "8081:80"
    depends_on:
      - worker1
      - worker2
      - worker3
    restart: unless-stopped

  # TIER 1: The Traffic Generator
  generator:
    build:
      context: .
      dockerfile: backend-generator/Dockerfile
    container_name: drl-generator
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # Generator hits the internal Nginx service name on port 80
      # The code appends /api/ratelimit/check automatically
      - RATELIMITER_LOADBALANCER_URL=http://loadbalancer
      - RATELIMITER_REDIS_ENABLED=false
    depends_on:
      - loadbalancer
    restart: unless-stopped

  # TIER 2: The Data Plane (Workers)
  worker1:
    build:
      context: .
      dockerfile: backend-worker/Dockerfile
    container_name: drl-worker-1
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - RATELIMITER_NODE_ID=worker-1
    depends_on:
      - redis
    restart: unless-stopped

  worker2:
    build:
      context: .
      dockerfile: backend-worker/Dockerfile
    container_name: drl-worker-2
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - RATELIMITER_NODE_ID=worker-2
    depends_on:
      - redis
    restart: unless-stopped

  worker3:
    build:
      context: .
      dockerfile: backend-worker/Dockerfile
    container_name: drl-worker-3
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - RATELIMITER_NODE_ID=worker-3
    depends_on:
      - redis
    restart: unless-stopped

  # TIER 3: The Control Plane (Manager)
  manager:
    build:
      context: .
      dockerfile: backend-manager/Dockerfile
    container_name: drl-manager
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - RATELIMITER_NODE_TYPE=manager
    depends_on:
      - redis
    restart: unless-stopped

networks:
  default:
    name: drl-network
