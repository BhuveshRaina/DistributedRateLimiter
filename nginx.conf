events {
    worker_connections 4096;
}

http {
    # Tier 2: The Rate Limit Workers (The Data Plane)
    # Nginx is now a dedicated high-performance balancer for the workers only.
    upstream worker_cluster {
        server worker1:8080;
        server worker2:8080;
        server worker3:8080;
    }

    server {
        listen 80;

        # Performance timeouts for high-volume worker traffic
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # Standard Rate Limit Check Endpoint
        # All benchmark traffic from the Generator hits this endpoint via the LB
        location /api/ratelimit/check {
            proxy_pass http://worker_cluster;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header X-Served-By-Worker $upstream_addr; 
        }

        # Health check for the worker pool itself
        location /health {
            return 200 'OK';
        }
    }
}
